<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torre dos Imperadores</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <div class="header-content">
        <img src="images/Logo.png" alt="Torre do Papel" class="logo">
        <div class="header-titles">
            <h1>REI DOS PIRATAS</h1>
            <p>Temporada 1</p>
        </div>
    </div>
</header>

<section class="controls-section">
    <div class="controls">
        <div class="search-box">
            <span>🔎</span>
            <input type="text" id="search" placeholder="Buscar pirata...">
        </div>
        <select id="sort">
            <option value="desc">Maior Pontuação</option>
            <option value="asc">Menor Pontuação</option>
        </select>
    </div>
</section>

<section class="stats">
    <div class="stat-card">
        <div class="stat-icon">🏴‍☠️</div>
        <div class="stat-info">
            <h3>Piratas</h3>
            <span id="totalPlayers">0</span>
        </div>
    </div>

    <div class="stat-card leader-card">
        <div class="stat-icon">👑</div>
        <div class="stat-info">
            <h3>Líder Atual</h3>
            <span id="leaderName">-</span>
        </div>
    </div>

    <div class="stat-card">
        <div class="stat-icon">🏆</div>
        <div class="stat-info">
            <h3>Maior Pontuação</h3>
            <span id="leaderPoints">0</span>
        </div>
    </div>
</section>

<main>
    <ul id="ranking-list"></ul>
</main>

<div id="imageModal" class="modal">
    <div class="modal-header">
        <span class="modal-close">&times;</span>
    </div>
    <div class="modal-body">
        <img class="modal-content" id="modalImage">
        <div id="modalCaption"></div>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
